name: Publish to PPA

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      series:
        description: "Ubuntu series (e.g. noble, jammy)"
        required: false
        default: "noble"
      packages:
        description: "Which packages to upload"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - googleapis
          - otel
          - sdk
      dry_run:
        description: "Dry run (build but do not upload)"
        required: false
        default: true
        type: boolean

concurrency:
  group: ppa-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  upload-to-ppa:
    name: "Build & Upload Source Packages"
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            devscripts \
            dput \
            debhelper \
            dpkg-dev \
            gnupg \
            cmake \
            protobuf-compiler \
            libprotobuf-dev

      - name: Import GPG key
        if: ${{ !inputs.dry_run && github.event_name != 'workflow_dispatch' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Trust the key
          GPG_FINGERPRINT=$(gpg --list-secret-keys --keyid-format long | grep -oP '(?<=sec\s{3}rsa4096/)[A-F0-9]+')
          echo "${GPG_FINGERPRINT}:6:" | gpg --import-ownertrust

      - name: Determine parameters
        id: params
        run: |
          # Series
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "series=${{ inputs.series }}" >> "$GITHUB_OUTPUT"
            echo "packages=${{ inputs.packages }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          else
            echo "series=noble" >> "$GITHUB_OUTPUT"
            echo "packages=all" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

          # GPG key ID
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long 2>/dev/null \
            | grep -oP '(?<=sec\s{3}rsa4096/)[A-F0-9]+' || echo "")
          echo "gpg_key=$GPG_KEY_ID" >> "$GITHUB_OUTPUT"

      - name: Build and upload source packages
        env:
          LAUNCHPAD_PPA: ${{ secrets.LAUNCHPAD_PPA || 'ppa:ydb-team/ydb-cpp-sdk' }}
        run: |
          ARGS=()
          ARGS+=(--ppa "$LAUNCHPAD_PPA")
          ARGS+=(--series "${{ steps.params.outputs.series }}")

          case "${{ steps.params.outputs.packages }}" in
            googleapis) ARGS+=(--googleapis) ;;
            otel)       ARGS+=(--otel) ;;
            sdk)        ARGS+=(--sdk) ;;
            *)          ARGS+=(--all) ;;
          esac

          if [[ -n "${{ steps.params.outputs.gpg_key }}" ]]; then
            ARGS+=(--gpg-key "${{ steps.params.outputs.gpg_key }}")
          fi

          if [[ "${{ steps.params.outputs.dry_run }}" == "true" ]]; then
            ARGS+=(--dry-run)
          fi

          ./scripts/upload_to_ppa.sh "${ARGS[@]}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-packages
          path: |
            /tmp/tmp.*/*.dsc
            /tmp/tmp.*/*.changes
            /tmp/tmp.*/*.tar.gz
          if-no-files-found: ignore
          retention-days: 7
