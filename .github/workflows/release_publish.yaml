name: Publish release artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach assets to (e.g. v1.2.3)"
        required: true
        type: string

concurrency:
  group: release-publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-upload-debs:
    name: "Build .deb packages and attach to release (Ubuntu 24.04 / noble)"
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ inputs.tag }}"  >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          ref: ${{ steps.tag.outputs.ref }}

      - name: Prepare Debian package cache key
        id: deb-package-cache-key
        shell: bash
        run: |
          echo "prefix=ubuntu-24.04-deb-packages-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'contrib/**', 'include/**', 'library/**', 'plugins/**', 'scripts/build_cpack_deb_packages.sh', 'scripts/generate-debian-directory.sh', 'scripts/googleapis_deb/**', 'src/**', 'third_party/api-common-protos/**', 'tools/**', 'util/**') }}" >> "$GITHUB_OUTPUT"

      - name: Restore Debian package build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .deb-ccache
            build_googleapis_deb
            build-deb
          key: ${{ steps.deb-package-cache-key.outputs.prefix }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ steps.deb-package-cache-key.outputs.prefix }}-
            ubuntu-24.04-deb-packages-

      - name: Build .deb packages in Ubuntu 24.04 container
        shell: bash
        run: |
          mkdir -p artifacts .deb-ccache build_googleapis_deb build-deb
          docker run --rm --network host \
            -e CCACHE_DIR=/source/.deb-ccache \
            -v "$PWD:/source" \
            ubuntu:24.04 \
            bash /source/scripts/build_cpack_deb_packages.sh /source/artifacts

      - name: Smoke-test generated .deb packages
        shell: bash
        run: |
          ./scripts/test_deb_packages.sh artifacts

      - name: List built artifacts
        shell: bash
        run: ls -la artifacts/

      - name: Upload .deb files to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" artifacts/*.deb --clobber

      - name: Upload .deb files as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages-${{ steps.tag.outputs.tag }}
          path: artifacts/*.deb
          if-no-files-found: warn
          retention-days: 30
