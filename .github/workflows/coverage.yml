name: Coverage

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    services:
      ydb:
        image: ydbplatform/local-ydb:24.4
        ports:
          - 2135:2135
          - 2136:2136
          - 8765:8765
        volumes:
          - /tmp/ydb_certs:/ydb_certs
        env:
          YDB_LOCAL_SURVIVE_RESTART: true
          YDB_USE_IN_MEMORY_PDISKS: true
          YDB_TABLE_ENABLE_PREPARED_DDL: true
        options: '-h localhost'
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        if: github.event.pull_request.head.sha != ''
        with:
          submodules: true
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout
        uses: actions/checkout@v4
        if: github.event.pull_request.head.sha == ''
        with:
          submodules: true

      - name: Install dependencies
        uses: ./.github/actions/prepare_vm

      - name: Configure and build with coverage
        shell: bash
        run: |
          mkdir -p build
          rm -rf build/*
          cmake --preset coverage-test-gcc
          cmake --build build -j"$(nproc)"

      - name: Test
        shell: bash
        run: |
          IAM_REGEX='^(DriverAuth|TMetadataFixture|TJwtIamFixture|TOAuthIamFixture|OAuth_WithFacility)\.'

          ctest -j1 --preset coverage-all -E "${IAM_REGEX}" --output-on-failure

          cleanup_iam() { docker rm -f ydb-iam >/dev/null 2>&1 || true; }
          trap cleanup_iam EXIT

          docker run -d --name ydb-iam --hostname localhost \
            -p 2235:2135 -p 2236:2136 -p 28765:8765 \
            -v /tmp/ydb_iam_certs:/ydb_certs \
            -e YDB_USE_IN_MEMORY_PDISKS=true \
            -e YDB_TABLE_ENABLE_PREPARED_DDL=true \
            -e YDB_ENFORCE_USER_TOKEN_REQUIREMENT=true \
            -e YDB_DEFAULT_CLUSTERADMIN=root@builtin \
            ghcr.io/ydb-platform/local-ydb:trunk

          for _ in $(seq 1 60); do
            if docker exec ydb-iam /ydb --endpoint grpc://localhost:2136 \
                --database /local sql -s 'select 1' >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          YDB_ENDPOINT=localhost:2236 YDB_DATABASE=/local \
            ctest -j1 --test-dir build -R "${IAM_REGEX}" --output-on-failure

      - name: Generate coverage report
        uses: ./.github/actions/gcovr
        with:
          build-directory: build
          source-root: ${{ github.workspace }}
          gcov-executable: gcov-13

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: build/coverage/coverage-codecov.lcov
          disable_search: true
          plugins: noop
          flags: sdk
          name: ydb-cpp-sdk
          fail_ci_if_error: true
          verbose: true

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage/
          retention-days: 14
